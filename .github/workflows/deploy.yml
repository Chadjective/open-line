name: Deploy to Pages

# Builds every instance and publishes them to GitHub Pages as one site:
#   /            → landing (links to each instance)
#   /calldoug/   → CallDoug, /callcarney/ → CallCarney, /callchow/ → CallChow
# Runs on every push to main (including the daily feed-refresh bot commit) and on demand.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # version comes from package.json "packageManager"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build # → dist/<instance>/ for every instance
      - run: node scripts/build-meta.mjs # → dist/index.html (issue-first browser) + dist/issues.json
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
