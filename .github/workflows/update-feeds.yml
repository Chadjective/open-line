name: Update feeds

# Runs the Open Line pipeline daily, refreshing every instance's articles.json.
# One workflow covers all instances (update.mjs --all auto-discovers them), so
# adding a new instance needs no workflow change.
on:
  schedule:
    # 11:00 UTC daily (~6-7am Eastern). Change to '0 */4 * * *' for every 4 hours.
    - cron: '0 11 * * *'
  workflow_dispatch:
    inputs:
      instance:
        description: 'Single instance id (blank = all)'
        required: false
        default: ''

permissions:
  contents: write # needed to commit the refreshed articles.json
  models: read # free GitHub Models inference via the built-in GITHUB_TOKEN
  actions: write # needed to dispatch the deploy workflow after a feed commit
  issues: write # needed to open the daily human-review digest issue

concurrency:
  group: update-feeds
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    # The pipeline takes ~3 min; a hung process must never block the queue for 6h again.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4 # version comes from package.json "packageManager"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # free GitHub Models inference (no secret to add)
        run: |
          if [ -n "${{ github.event.inputs.instance }}" ]; then
            node pipeline/update.mjs "${{ github.event.inputs.instance }}"
          else
            node pipeline/update.mjs --all
          fi

      - name: Commit refreshed feeds
        id: commit
        run: |
          git config user.name  "open-line-bot"
          git config user.email "bot@openline.ca"
          if [ -z "$(git status --porcelain -- instances/ review/)" ]; then
            echo "No feed changes."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git add -A instances/
            [ -d review ] && git add -A review/
            git commit -m "chore: refresh article feeds"
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      # The mixed-risk compromise: everything ungated auto-publishes on cadence, and a
      # human skims one digest issue per day — held items with reasons + what published.
      - name: Open review digest issue
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -s review/digest.md ]; then
            DATE=$(date -u +%F)
            EXISTING=$(gh issue list --state open --search "Review digest — $DATE in:title" --json number --jq '.[0].number // empty')
            if [ -n "$EXISTING" ]; then
              gh issue comment "$EXISTING" --body-file review/digest.md
            else
              gh issue create --title "Review digest — $DATE" --body-file review/digest.md
            fi
          fi

      # Pushes made with GITHUB_TOKEN never fire other workflows' `on: push` (loop
      # prevention), so publish the new feeds via an explicit workflow_dispatch — the
      # documented exception to that rule.
      - name: Trigger deploy
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref main
